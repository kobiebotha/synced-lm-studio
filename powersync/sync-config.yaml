config:
  edition: 3

streams:
  # This Sync Stream has been translated from bucket definitions. There may be
  # more efficient ways to express these queries.
  migrated_to_streams:
    auto_subscribe: true
    with:
      device_models_param: SELECT id AS device_id FROM devices WHERE owner_user_id = auth.user_id()
      conversation_messages_param: SELECT id AS conversation_id FROM conversations WHERE owner_user_id = auth.user_id()
      device_operations_param: SELECT id AS device_id FROM devices WHERE owner_user_id = auth.user_id()
      operation_events_param: SELECT id AS operation_id FROM device_operations WHERE requested_by_user_id = auth.user_id()
    queries:
      - SELECT * FROM devices WHERE owner_user_id = auth.user_id()
      - "SELECT device_models.* FROM device_models,device_models_param AS bucket WHERE device_models.device_id = bucket.device_id"
      - SELECT * FROM conversations WHERE owner_user_id = auth.user_id()
      - "SELECT messages.* FROM messages,conversation_messages_param AS bucket WHERE messages.conversation_id = bucket.conversation_id"
      - "SELECT lmstudio_threads.* FROM lmstudio_threads,conversation_messages_param AS bucket WHERE lmstudio_threads.conversation_id = bucket.conversation_id"
      - "SELECT device_operations.* FROM device_operations,device_operations_param AS bucket WHERE device_operations.device_id = bucket.device_id"
      - "SELECT operation_events.* FROM operation_events,operation_events_param AS bucket WHERE operation_events.operation_id = bucket.operation_id"
  shared_conversation:
    priority: 1
    accept_potentially_dangerous_queries: true
    with:
      shared_conversation_param: SELECT id AS conversation_id FROM conversations WHERE share_token = subscription.parameter('share_token')
    queries:
      - "SELECT conversations.* FROM conversations WHERE conversations.share_token = subscription.parameter('share_token')"
      - "SELECT messages.* FROM messages,shared_conversation_param AS shared WHERE messages.conversation_id = shared.conversation_id"
